name: "Deploy Edge Functions"

# Manual, one-off deployment of this repo's Supabase Edge Functions:
#   - notify-visitor-entry: emails on new Visitors Book entries
#   - ferry-status: live St Mawes Ferry running status
#   - bin-collection: next bin collection from Cornwall Council
# Run from the Actions tab (Run workflow) after adding the required
# repository secrets: SUPABASE_ACCESS_TOKEN, SMTP_HOST, SMTP_PORT,
# SMTP_USER, SMTP_PASS, NOTIFY_TO, WEBHOOK_SECRET.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy notify-visitor-entry
        run: npx supabase@latest functions deploy notify-visitor-entry --project-ref jcjhnscpunecubmcmkzr --no-verify-jwt --use-api

      - name: Set notify-visitor-entry secrets
        run: |
          npx supabase@latest secrets set --project-ref jcjhnscpunecubmcmkzr \
            SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            SMTP_USER="${{ secrets.SMTP_USER }}" \
            SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            NOTIFY_TO="${{ secrets.NOTIFY_TO }}" \
            WEBHOOK_SECRET="${{ secrets.WEBHOOK_SECRET }}"

      - name: Deploy ferry-status
        run: npx supabase@latest functions deploy ferry-status --project-ref jcjhnscpunecubmcmkzr --no-verify-jwt --use-api

      - name: Deploy bin-collection
        run: npx supabase@latest functions deploy bin-collection --project-ref jcjhnscpunecubmcmkzr --no-verify-jwt --use-api
