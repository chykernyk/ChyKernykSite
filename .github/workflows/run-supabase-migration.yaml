name: "Run Supabase Migration"

# Manual, one-off runner for supabase/migrations/*.sql against the project's
# database via the Supabase Management API. Run from the Actions tab after
# adding the SUPABASE_ACCESS_TOKEN repository secret. Uses a GitHub-hosted
# runner because this SQL endpoint (api.supabase.com) isn't reachable from
# some sandboxed dev sessions.

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Path to the .sql file to run, relative to the repo root"
        required: true
        default: "supabase/migrations/0001_fishing_spots.sql"

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Run migration
        run: |
          SQL=$(cat "${{ inputs.migration_file }}")
          jq -n --arg query "$SQL" '{query: $query}' > /tmp/payload.json
          curl -sS --fail-with-body -X POST \
            "https://api.supabase.com/v1/projects/jcjhnscpunecubmcmkzr/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/payload.json
